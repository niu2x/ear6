name: Deploy Web to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.73

      - name: Ensure system cmake takes precedence
        run: |
          sudo apt-get update && sudo apt-get install -y cmake
          echo "/usr/bin" >> $GITHUB_PATH
          cmake --version

      - name: Build ear6-web (WASM)
        run: make ear6-web
        env:
          EMSCRIPTEN_CMAKE_TOOLCHAIN: ${{ env.EMSDK }}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake

      - name: Copy WASM to web-ui public
        run: |
          mkdir -p app/web-ui/public/ear6
          cp build-web/app/web/ear6-web.js app/web-ui/public/ear6/
          cp build-web/app/web/ear6-web.wasm app/web-ui/public/ear6/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app/web-ui

      - name: Build web-ui (Vite)
        run: npm run build -- --base=/ear6/
        working-directory: app/web-ui

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/web-ui/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
